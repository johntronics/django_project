<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Heart Failure API{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif; 
            max-width: 800px; 
            margin: 40px auto; 
            line-height: 1.6;
            color: #333;
        }
        hr {
            border: 0;
            border-top: 1px solid #ccc;
            margin: 20px 0;
        }
        a {
            color: #0066cc;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <main>
        {% block content %}
        {% endblock content %}
    </main>

</body>
</html>
